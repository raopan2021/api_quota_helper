name: Build-Release

on:
  # 自动触发：监听 Build-Apk 完成（非 chore commit 成功才算）
  workflow_run:
    workflows: ["Build-Apk"]
    types: [completed]
    branches: [master]

  # 手动触发：直接推送 v* 标签（如 v1.0.34）
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # workflow_run 触发：自动从 Build-Apk 成功结果中提取版本信息
  auto-release:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: 配置签名信息
        run: |
          if [ -n "${{ secrets.KEY_STORE_BASE64 }}" ]; then
            echo "${{ secrets.KEY_STORE_BASE64 }}" | base64 --decode > app/api_quota_helper.jks
            echo "KEY_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: 获取版本号
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: |
          chmod 777 ./gradlew
          ./gradlew app:assembleRelease

      - name: 创建 GitHub Release
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: Release ${{ steps.version.outputs.TAG_NAME }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG_NAME, 'beta') || contains(steps.version.outputs.TAG_NAME, 'alpha') }}
          files: app/build/outputs/apk/release/app-release.apk

  # push tag 触发：手动推送 v* 标签
  tag-release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: 配置签名信息
        run: |
          if [ -n "${{ secrets.KEY_STORE_BASE64 }}" ]; then
            echo "${{ secrets.KEY_STORE_BASE64 }}" | base64 --decode > app/api_quota_helper.jks
            echo "KEY_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build release APK
        run: |
          chmod 777 ./gradlew
          ./gradlew app:assembleRelease

      - name: 创建 GitHub Release
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: app/build/outputs/apk/release/app-release.apk
