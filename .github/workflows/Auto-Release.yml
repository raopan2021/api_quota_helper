name: Release Build

# 触发条件：
# 1. push 到 master 分支（自动检测版本变化）
# 2. 手动触发（workflow_dispatch）
on:
  push:
    branches:
      - master
  workflow_dispatch:

# GitHub Actions 需要写权限来创建 tag 和 release
permissions:
  contents: write

jobs:
  # ==================== 步骤1：提取版本号 ====================
  # 从 app/build.gradle.kts 中读取 val ver = "X.X.X"
  # 输出：
  #   version: X.X.X（如 1.0.63）
  #   tag: vX.X.X（如 v1.0.63）
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - id: extract
        run: |
          # 使用 sed 提取 val ver = "X.X.X" 中的版本号
          VER=$(grep 'val ver = ' app/build.gradle.kts | sed 's/.*val ver = "//;s/".*//')
          echo "提取到版本: $VER"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT

  # ==================== 步骤2：检查tag是否已存在 ====================
  # 如果 tag 已存在，说明这个版本已经发布过，跳过重复发布
  # 如果 tag 不存在，说明是新版本，需要发布
  check-tag:
    needs: extract-version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          # fetch-depth: 0 获取全部历史，用于检查 tag
          fetch-depth: 0
      - id: check
        run: |
          TAG="${{ needs.extract-version.outputs.tag }}"
          echo "检查 tag: $TAG"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag 已存在，跳过发布"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "tag 不存在，将创建并发布"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ==================== 步骤3：构建 APK ====================
  # 每次 push 到 master 都会执行构建（无论是否发布）
  # 但只有 should_release=true 时才会保存 APK
  build:
    needs: [extract-version, check-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # 使用 github.sha 确保构建的是触发本次 workflow 的那个 commit
          ref: ${{ github.sha }}

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: 配置签名信息
        run: |
          # 如果配置了签名 secrets，则解码 keystore 文件
          if [ -n "${{ secrets.KEY_STORE_BASE64 }}" ]; then
            echo "${{ secrets.KEY_STORE_BASE64 }}" | base64 --decode > app/api_quota_helper.jks
            echo "KEY_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "已配置签名信息"
          else
            echo "未配置签名信息，将使用调试签名"
          fi

      - name: 构建 release APK
        run: |
          chmod 777 ./gradlew
          ./gradlew app:assembleRelease
          echo "构建完成"

      # 只有需要发布时才上传 artifact
      - uses: actions/upload-artifact@v4
        if: needs.check-tag.outputs.should_release == 'true'
        with:
          # artifact 名称包含版本号，方便区分
          name: release-apk-${{ needs.extract-version.outputs.version }}
          path: app/build/outputs/apk/release

  # ==================== 步骤4：创建 git tag ====================
  # 只有 should_release=true 时才执行
  # 创建以 "v" 为前缀的 tag，如 v1.0.63
  create-tag:
    needs: [extract-version, check-tag]
    runs-on: ubuntu-latest
    if: needs.check-tag.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          # 必须 fetch-depth: 0 才能推送 tag
          fetch-depth: 0
      - name: 创建并推送 tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.extract-version.outputs.tag }}"
          git push origin "${{ needs.extract-version.outputs.tag }}"
          echo "已创建 tag: ${{ needs.extract-version.outputs.tag }}"

  # ==================== 步骤5：发布 GitHub Release ====================
  # 只有所有前序步骤都成功后才执行
  # 使用 softprops/action-gh-release 创建正式的 Release
  release:
    needs: [extract-version, check-tag, create-tag, build]
    runs-on: ubuntu-latest
    if: needs.check-tag.outputs.should_release == 'true'
    steps:
      # 下载构建好的 APK
      - uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ needs.extract-version.outputs.version }}
          path: release

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag 名称
          tag_name: ${{ needs.extract-version.outputs.tag }}
          # Release 标题
          name: Release ${{ needs.extract-version.outputs.tag }}
          # 上传的 APK 文件
          files: release/app-release.apk
          # 是否为草稿（false = 直接发布）
          draft: false
          # 如果版本号包含 beta 或 alpha 则为预发布
          prerelease: ${{ contains(needs.extract-version.outputs.version, 'beta') || contains(needs.extract-version.outputs.version, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ==================== 使用说明 ====================
# 工作流程：
# 1. 每次 push 到 master，自动提取 build.gradle.kts 中的版本号
# 2. 检查对应的 tag（vX.X.X）是否已存在
# 3. 如果 tag 不存在：
#    - 创建 tag 并推送
#    - 构建 release APK
#    - 创建 GitHub Release 并上传 APK
# 4. 如果 tag 已存在：只构建，不发布（防止重复发布）
#
# 版本号规范：
# - 使用语义化版本（Semantic Versioning）
# - versionCode 自动计算：major*10000 + minor*100 + patch
#   例如：1.0.63 -> 10063，1.1.0 -> 10100，2.0.0 -> 20000
# - git tag 使用 "v" + versionName，如 v1.0.63
#
# 注意事项：
# - 只需修改 build.gradle.kts 中的 val ver = "X.X.X"
# - versionCode 和 git tag 自动同步
# - 不要手动创建 tag，会导致版本混乱
