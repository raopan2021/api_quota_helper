name: Build-Apk

on:
  workflow_dispatch:

  push:
    branches:
      - 'master'
    paths-ignore:
      - 'LICENSE'
      - '*.md'

permissions:
  contents: write

jobs:
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore:') && !startsWith(github.event.head_commit.message, 'chore(') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build debug APK
        run: |
          chmod 777 ./gradlew
          ./gradlew app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: 推送版本标签
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          if [ -n "$VERSION" ]; then
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            # 用 build/ 前缀，不会触发 Build-Release（它只监听 v*）
            git tag -f build/v$VERSION
            git push origin build/v$VERSION --force
            echo "Tagged build/v$VERSION"
          fi
