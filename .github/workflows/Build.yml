name: Build

on:
  workflow_dispatch:

  push:
    branches:
      - 'master'
    paths-ignore:
      - 'LICENSE'
      - '*.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build debug APK
        run: |
          chmod 777 ./gradlew
          ./gradlew app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: 获取版本号
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$VERSION" >> $GITHUB_OUTPUT

      - name: 创建 Release（仅非 chore commit）
        if: ${{ !startsWith(github.event.head_commit.message, 'chore:') && !startsWith(github.event.head_commit.message, 'chore(') }}
        run: |
          # 构建 release APK
          chmod 777 ./gradlew
          ./gradlew app:assembleRelease

          # 生成 changelog（取上次 tag 之后的 commit）
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          CHANGELOG=""
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG="$(git log $LAST_TAG..HEAD --oneline --format='- %s')"
          fi

          # 创建 GitHub Release
          TAG_NAME="v${{ steps.version.outputs.VERSION }}"
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes "$CHANGELOG" \
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
