name: Build APK

on:
  push:
    branches: [master]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate release keystore
      run: |
        keytool -genkeypair -v -storetype JKS -keyalg RSA -keysize 2048 -validity 10000 \
          -keystore release.keystore \
          -alias api_quota_helper \
          -storepass raopan2021 \
          -keypass raopan2021 \
          -dname "CN=raopan2021, OU=raopan2021, O=raopan2021, L=China, ST=China, C=CN"
    
    - name: Create key.properties
      run: |
        echo "storeFile=release.keystore" >> key.properties
        echo "storePassword=raopan2021" >> key.properties
        echo "keyAlias=api_quota_helper" >> key.properties
        echo "keyPassword=raopan2021" >> key.properties
    
    - name: Setup Expo
      uses: expo/expo-github-action@v8
      with:
        expo-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
    
    - name: Prebuild Android
      run: npx expo prebuild --platform android --clean
    
    - name: Fix enableBundleCompression for RN 0.76
      run: |
        sed -i 's/enableBundleCompression =/\/\/ enableBundleCompression =/' android/app/build.gradle
    
    - name: Configure Gradle Kotlin version
      run: |
        # 修复 expo-modules-core Kotlin 编译问题
        echo "kotlin.jvm.target.validation.mode=IGNORE" >> android/gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
    
    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon
      env:
        EXPO_NO_TELEMETRY: 1
    
    - name: Build Android APK (Release)
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
      env:
        EXPO_NO_TELEMETRY: 1
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-release
        path: android/app/build/outputs/apk/release/
    
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: android/app/build/outputs/apk/release/app-release-unsigned.apk
        generate_release_notes: true
