name: Build APK

on:
  push:
    branches: [master]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        
    - name: Install dependencies
      run: flutter pub get
    
    - name: Generate release keystore
      run: |
        keytool -genkeypair -v -storetype JKS -keyalg RSA -keysize 2048 -validity 10000 \
          -keystore release.keystore \
          -alias api_quota_helper \
          -storepass raopan2021 \
          -keypass raopan2021 \
          -dname "CN=raopan2021, OU=raopan2021, O=raopan2021, L=China, ST=China, C=CN"
    
    - name: Create key.properties
      run: |
        echo "storeFile=release.keystore" > key.properties
        echo "storePassword=raopan2021" >> key.properties
        echo "keyAlias=api_quota_helper" >> key.properties
        echo "keyPassword=raopan2021" >> key.properties
        
    - name: Build APK
      run: flutter build apk --release
      
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-release
        path: build/app/outputs/flutter-apk/app-release.apk
        
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        generate_release_notes: true
