name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  windows-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows
        run: |
          cd windows
          dotnet publish -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish

      - name: Extract version
        id: extract-version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd windows
          gh release create v${{ steps.extract-version.outputs.VERSION }} \
            --title "v${{ steps.extract-version.outputs.VERSION }}" \
            --notes "API Quota Helper Windows版 v${{ steps.extract-version.outputs.VERSION }}" \
            ApiQuotaHelper.exe

  android-release:
    needs: windows-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew app:assembleRelease --no-daemon --no-build-cache

      - name: Extract version
        id: extract-version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd android
          gh release upload v${{ steps.extract-version.outputs.VERSION }} \
            app/build/outputs/apk/release/api-quota-helper-${{ steps.extract-version.outputs.VERSION }}.apk \
            --clobber
